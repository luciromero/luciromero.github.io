# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - README.md
  - .gitignore
  - vendor/
