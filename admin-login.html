---
layout: default
title: "Admin login"
description: "Acceso administrador"
permalink: /admin/login/
---

<style>
  .admin-login-wrap {
    min-height: calc(100vh - 240px);
    display: grid;
    place-items: center;
    padding: 7rem 1rem 3rem;
  }

  .admin-login-card {
    width: 100%;
    max-width: 420px;
    background: rgba(8, 8, 15, 0.88);
    border: 1px solid rgba(77, 158, 255, 0.3);
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: 0 24px 50px rgba(0, 102, 255, 0.18);
  }

  .admin-login-kicker {
    color: #9faabf;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.35rem;
  }

  .admin-login-title {
    color: #ffffff;
    font-size: 1.5rem;
    margin-bottom: 1rem;
  }

  .admin-login-label {
    display: block;
    margin-bottom: 0.35rem;
    color: #e6edf8;
    font-size: 0.9rem;
  }

  .admin-login-input {
    width: 100%;
    border-radius: 10px;
    border: 1px solid rgba(159, 170, 191, 0.4);
    background: rgba(14, 14, 26, 0.8);
    color: #ffffff;
    padding: 0.7rem 0.75rem;
    margin-bottom: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .admin-login-input:focus {
    border-color: #4d9eff;
    box-shadow: 0 0 0 3px rgba(77, 158, 255, 0.2);
  }

  .admin-login-btn {
    width: 100%;
    border: 0;
    border-radius: 10px;
    padding: 0.75rem;
    font-weight: 600;
    background: linear-gradient(135deg, #0066ff, #00d4ff);
    color: #ffffff;
    cursor: pointer;
  }

  .admin-login-error {
    display: none;
    margin-top: 0.8rem;
    color: #ff9ca3;
    font-size: 0.9rem;
  }

  .admin-login-help {
    margin-top: 0.8rem;
    color: #9faabf;
    font-size: 0.8rem;
  }
</style>

<section class="admin-login-wrap">
  <div class="admin-login-card">
    <p class="admin-login-kicker">Panel interno</p>
    <h1 class="admin-login-title">Acceso administrador</h1>

    <form id="adminLoginForm">
      <label class="admin-login-label" for="adminUser">Usuario</label>
      <input class="admin-login-input" id="adminUser" type="text" autocomplete="username" required>

      <label class="admin-login-label" for="adminPass">Contrasena</label>
      <input class="admin-login-input" id="adminPass" type="password" autocomplete="current-password" required>

      <button class="admin-login-btn" type="submit">Ingresar</button>
      <p id="adminLoginError" class="admin-login-error">Credenciales invalidas.</p>
      <p class="admin-login-help">Cambia las credenciales en este archivo antes de publicar.</p>
    </form>
  </div>
</section>

<script>
  (function () {
    var ADMIN_USER = 'luciana';
    var ADMIN_PASS = 'LuAdmin2026!';
    var AUTH_KEY = 'lr_admin_auth';

    var params = new URLSearchParams(window.location.search);
    var next = params.get('next') || '{{ "/admin/presupuesto/" | relative_url }}';

    if (!next.startsWith('/')) {
      next = '{{ "/admin/presupuesto/" | relative_url }}';
    }

    try {
      if (sessionStorage.getItem(AUTH_KEY) === 'ok') {
        window.location.replace(next);
      }
    } catch (error) {
      // no-op
    }

    var form = document.getElementById('adminLoginForm');
    var errorBox = document.getElementById('adminLoginError');

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      var user = document.getElementById('adminUser').value.trim();
      var pass = document.getElementById('adminPass').value;

      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        try {
          sessionStorage.setItem(AUTH_KEY, 'ok');
        } catch (error) {
          // no-op
        }
        window.location.href = next;
        return;
      }

      errorBox.style.display = 'block';
    });
  })();
</script>
